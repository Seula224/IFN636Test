name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test-and-deploy:
    # This tells GitHub to run the code on your AWS machine!
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Create .env File from PROD Secret
        run: |
          cd backend
          # This takes your 'PROD' secret and writes it into a real .env file
          echo "${{ secrets.PROD }}" > .env

      - name: Run All 31 Tests
        working-directory: ./backend
        run: npm test

      - name: Restart Services with PM2
        # This keeps the app running on your AWS server after the tests pass
        run: |
          pm2 restart all || pm2 start backend/server.js --name "backend"
