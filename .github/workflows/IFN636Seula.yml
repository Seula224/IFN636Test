name: CI/CD Pipeline - Final Tuned Version

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # JOB 1: The Build Box
  Build-Application:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install All Dependencies
        run: |
          cd backend && npm install
          cd ../frontend && npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

  # JOB 2: The Test & Deploy Box
  Run-Tests-and-Deploy:
    needs: Build-Application
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ⭐ THE FIX: Re-install backend tools so they are ready for testing
      - name: Install Backend Tools
        run: |
          cd backend
          npm install

      - name: Create .env from PROD Secret
        run: |
          cd backend
          echo "${{ secrets.PROD }}" > .env

      - name: Run Backend Integration Tests
        run: |
          cd backend
          npm test

      - name: Deploy with PM2
        run: |
          pm2 restart all || pm2 start backend/server.js --name "backend"
